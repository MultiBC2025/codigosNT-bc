    function formatearDiasTexto(diff) {
        if (diff > 5) return "Vence en " + diff + "d";
        if (diff > 1 && diff <= 5) return "Próximo a vencer (" + diff + "d)";
        if (diff === 1) return "Vence Mañana";
        if (diff === 0) return "Vence Hoy";
        if (diff === -1) return "Venció Ayer";
        if (diff < -1) return "Venció hace " + Math.abs(diff) + "d";
        return diff + "d";
    }

async function verificarAcceso() {
    const tel = document.getElementById("inputTel").value.trim();
    if(!tel) return alert("Ingresa tu número.");
    const btn = document.getElementById("btnAcceder");
    btn.disabled = true; btn.innerText = "Buscando...";

    try {
        const snapClientes = await db.collection("clientes").get();
        // Definimos la lista de clientes encontrados (con S al final)
        let clientesEncontrados = []; 

        snapClientes.forEach(doc => {
            const c = doc.data();
            const numBD = (c.whatsapp || "").replace(/\D/g, '');
            // Si el número coincide, lo agregamos a la lista
            if(numBD.includes(tel) && tel.length >= 7) {
                clientesEncontrados.push({ id: doc.id, ...c });
            }
        });

        // Si la lista tiene al menos un cliente
        if(clientesEncontrados.length > 0) {
            cargarPanelCliente(clientesEncontrados); 
        } else { 
            alert("No registrado."); 
            btn.disabled = false; 
            btn.innerText = "Consultar"; 
        }
    } catch (e) { 
        alert("Error"); 
        btn.disabled = false; 
    }
}
async function cargarPanelCliente(clientesEncontrados) {
    const hoyLocal = new Date();
    const hora = hoyLocal.getHours();
    hoyLocal.setHours(0,0,0,0);
    let momentoDia = hora < 12 ? "Buenos días" : (hora < 18 ? "Buenas tardes" : "Buenas noches");

    document.getElementById("sectionPanel").style.display = "block";

    try {
        let servicios = [];

        for (const cliente of clientesEncontrados) {
            const snapCuentas = await db.collection("cuentas").where("clienteId", "==", cliente.id).get();
            
            snapCuentas.forEach(doc => {
                const d = doc.data();
                const fVenceObj = new Date(d.fin + "T12:00:00");
                const diff = Math.ceil((fVenceObj - hoyLocal) / (1000 * 60 * 60 * 24)) - 1;
                // Agregamos el nombre del titular al objeto para saber de quién es cada cuenta
                if (diff >= -20) servicios.push({ ...d, diff, nombreTitular: cliente.nombre });

        }

        // Lógica de pagos (usando los últimos de la lista general)
        const pagosOrd = [...servicios].sort((a, b) => new Date(b.inicio) - new Date(a.inicio)).slice(0, 2);

                <h4 class="mb-0">¡${momentoDia}, ${clientesEncontrados[0].nombre}! 👋</h4>

            <hr>
            <div class="mb-4 text-center text-md-start">
                <h2 class="fw-bold mb-0">Estado de tus suscripciones</h2>
                <p class="text-muted">Gestiona tus cuentas y vencimientos</p>
            </div>
            <div class="banner-largo"><p class="mb-0 fw-bold">🚀 PUBLICIDAD: ¡RENUEVA A TIEMPO Y OBTÉN GRANDES DESCUENTOS! 🚀</p></div>`;

        const generarHTML = (s) => {
            const fV = s.fin.split('-').reverse().join('/');
            const ahoraMomento = new Date();
            const pName = s.plataforma.toUpperCase();
            let btnLink = "";
            if(s.diff >= 0) {
                if(pName.includes("NETFLIX")) btnLink = `<a href="${linkNetflix}" target="_blank" class="btn-autogestion">Autogestión</a>`;
                else if(pName.includes("DISNEY")) btnLink = `<a href="${linkDisney}" target="_blank" class="btn-autogestion">Autogestión</a>`;

            const fechaHoyText = ahoraMomento.toLocaleDateString('es-ES', { day: '2-digit', month: 'long' });

            const fechaMañanaText = mañana.toLocaleDateString('es-ES', { day: '2-digit', month: 'long' });

            let palabraFinaliza = "";
            if (s.diff > 0) {
                textoEstado = "está próximo a vencer (falta(n) *" + s.diff + "* día(s))";

            let cuerpoTxt = "Hola *_MultiEntretenimiento BC_* (̶◉͛‿◉̶), ¿Cómo están?.\n\n" +
                            "Quiero informar que mi servicio de *" + s.plataforma.toUpperCase() + "* " + textoEstado + "\n" +

        const vigentes = servicios.filter(s => s.diff > 5).sort((a,b) => b.diff - a.diff);
        const proximos = servicios.filter(s => s.diff >= 0 && s.diff <= 5).sort((a,b) => a.diff - b.diff);
