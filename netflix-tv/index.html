<!DOCTYPE html>
<html> 
<head>
    <title>Panel de Acceso - MultiBC</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="panelContenido">
        <h1>Cargando tu servicio...</h1>
    </div>

    <script>
        // Inicializar Firebase
        const firebaseConfig = { /* TUS DATOS DE CONFIGURACIÓN */ };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Lógica de carga
        const urlParams = new URLSearchParams(window.location.search);
        const idVenta = urlParams.get('id');

        async function cargarPanel() {
            if (!idVenta) return document.body.innerHTML = "Link inválido.";
            
            const doc = await db.collection("cuentas").doc(idVenta).get();
            if (!doc.exists) return document.body.innerHTML = "Servicio inactivo o finalizado.";

            const d = doc.data();
            document.getElementById("panelContenido").innerHTML = `
                <h2>Tu Servicio: ${d.plataforma}</h2>
                <p>Correo: <b>${d.correo}</b></p>
                <p>Clave: <b>${d.clave}</b></p>
                <p>Perfil: <b>${d.perfil}</b></p>
                <p>PIN: <b>${d.pin || "Sin PIN"}</b></p>
            `;
        }
        cargarPanel();
    </script>
</body>
</html>
