<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Servicio - MultiBC</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 450px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .header-info { font-size: 12px; color: #666; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #e50914; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #b20710; }
        .footer { margin-top: 20px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card" id="contenido">
    <h1>Cargando...</h1>
</div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyBZKmJQ7TcszQeBu--3jK4sxA3F3tAF_N8", 
        authDomain: "panel-cuentas-clientes.firebaseapp.com", 
        projectId: "panel-cuentas-clientes" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const urlParams = new URLSearchParams(window.location.search);
    const idVenta = urlParams.get('id');

    if (idVenta) {
        iniciarEscucha(idVenta);
    } else {
        mostrarFormulario();
    }

    function mostrarFormulario() {
        document.getElementById('contenido').innerHTML = `
            <h3>Acceso de Cliente</h3>
            <input type="text" id="codigoInput" placeholder="Ingresa tu código de servicio">
            <button onclick="buscarPorCodigo()">Ver mi Servicio</button>
        `;
    }

    async function buscarPorCodigo() {
        const codigo = document.getElementById('codigoInput').value;
        if(codigo) window.location.href = `?id=${codigo}`;
    }

    function iniciarEscucha(id) {
        db.collection("cuentas").doc(id).onSnapshot((doc) => {
            if (!doc.exists) {
                document.getElementById('contenido').innerHTML = "<h3>Código no válido.</h3><a href='.'>Volver</a>";
                return;
            }
            renderizar(doc.data(), doc.id);
        });
    }

    function renderizar(d, id) {
        const contenido = document.getElementById('contenido');
        const fFin = new Date(d.fin);
        const dias = Math.ceil((fFin - new Date()) / (1000 * 60 * 60 * 24));
        
        const header = `<div class="header-info">Inicio: ${d.inicio} | Fin: ${d.fin} | Días: ${dias}</div>`;

        switch(d.estado) {
            case "desconectado":
                contenido.innerHTML = `${header}
                    <img src="https://lh3.googleusercontent.com/p/AF1QipOZvd1JR-k6gN7h0uOdniak86-oMb2Es8vDMaoA=s1360-w1360-h1020-rw" style="width:80px;">
                    <h2>Hola, ${d.perfil_etiqueta ? d.perfil_etiqueta.split('. ')[1] : 'Cliente'}</h2>
                    <p>Confirma el código que aparece en tu TV Netflix:</p>
                    <input type="text" id="codeTv" placeholder="--- ---">
                    <button onclick="actualizarEstado('${id}', 'procesando')">Continuar</button>`;
                break;
            case "procesando":
                contenido.innerHTML = `<h3>Cargando, por favor espera...</h3>`;
                break;
            case "tv-activo":
                contenido.innerHTML = `${header}<h2>¡Configurado!</h2>
                    <p><b>Perfil:</b> ${d.perfil}</p>
                    <p><b>PIN:</b> ${d.pin}</p>`;
                break;
            case "error-netflix":
                contenido.innerHTML = `<h3>Código incorrecto</h3><p>Intenta de nuevo.</p>
                    <button onclick="actualizarEstado('${id}', 'desconectado')">Continuar</button>`;
                break;
            case "error-conexion":
                contenido.innerHTML = `<h3>Servidor caído</h3><p>Intenta en 1 minuto.</p>
                    <button onclick="actualizarEstado('${id}', 'desconectado')">Aceptar</button>`;
                break;
        }
    }

    async function actualizarEstado(id, est) {
        const payload = { estado: est };
        if(est === 'procesando') payload.codigo_tv = document.getElementById('codeTv').value;
        await db.collection("cuentas").doc(id).update(payload);
    }
</script>
</body>
</html>
